<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estados e cidades - API/IBGE</title>

    <script src="api-ibge.js"></script>
</head>
<body>

    <h1>Cadastro de Pessoas</h1>

    <form action="#">

        <!-- Dados das pessoas -->

        <button 
            onclick="carregarEstados()"
            type="button">
            Carregar estados
        </button>

        <div>
            <label for="estados">Estado:</label>
            
            <select name="estados" id="estados">

                <!-- Recuperar os estados a partir da API de localidades do IBGE -->
                

            </select>

        </div>

        <div>
            <label for="cidades">Cidade:</label>
            
            <select name="cidades" id="cidades">

                <!-- Recuperar as cidades a partir da API de localidades do IBGE conforme o estado selecionado -->

            </select>

        </div>        


    </form>
    
</body>
</html>
